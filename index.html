<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neural Tree Architect v0.9.1</title>
  
  <!-- External Resources -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <!-- Local Styles -->
  <link rel="stylesheet" href="src/style.css" />
</head>
<body data-theme="default">

  <div class="crt-overlay"></div>
  <div class="ambient ambient-1"></div>
  <div class="ambient ambient-2"></div>

  <header>
    <div class="logo-container">
      <div class="logo-icon">N</div>
      <div class="header-info">
        <h1>Neural Tree</h1>
        <div class="flex gap-2 mt-0.5">
          <div class="theme-dot bg-sky-500 active" data-set-theme="default" title="Default Neon"></div>
          <div class="theme-dot bg-emerald-500" data-set-theme="matrix" title="Matrix Mode"></div>
          <div class="theme-dot bg-amber-500" data-set-theme="amber" title="Amber CRT"></div>
        </div>
      </div>
    </div>
    
    <div class="header-actions flex items-center gap-2">
      <div class="flex gap-1 border-r border-slate-800 pr-2 mr-1">
        <button class="action-btn" id="btn-undo" title="Undo (Ctrl+Z)"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 14L4 9l5-5"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg></button>
        <button class="action-btn" id="btn-redo" title="Redo (Ctrl+Y)"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 14l5-5-5-5"/><path d="M4 20v-7a4 4 0 014-4h12"/></svg></button>
      </div>
      <button class="btn btn-outline" id="btn-tips" title="How to use">Tips</button>
      <button class="btn btn-outline text-red-400 border-red-900/30" id="btn-clear-all" title="Clear all nodes">Clear</button>
      <button class="btn btn-outline" id="btn-import" title="Import JSON">Imp</button>
      <button class="btn btn-outline" id="btn-export-json" title="Export JSON">JSON</button>
      <button class="btn btn-outline" id="btn-export-md" title="Export Markdown List">MD</button>
      <button class="btn btn-outline" id="btn-export-mmd" title="Export Mermaid Diagram">MMD</button>
      <button class="btn btn-outline" id="btn-print" title="Print Tree">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
        Print
      </button>
      <button class="btn btn-outline" id="btn-shot" title="Save as Image">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Shot
      </button>
      <button class="btn btn-primary" id="btn-copy" title="Copy ASCII Tree">Copy</button>
    </div>
  </header>

  <main>
    <aside id="panel-architect">
      <div class="toolbar-top">
        <div class="search-input-wrap">
          <span class="absolute left-2.5 text-slate-500">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </span>
          <input type="text" id="node-search" class="search-input" placeholder="Search nodes...">
        </div>
        <button class="action-btn" id="btn-expand-all" title="Toggle All Nodes"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></button>
      </div>
      <div id="breadcrumb-nav"></div>
      <div class="nodes-container" id="nodes-root-list"></div>
      <div class="p-4 border-t border-slate-800 bg-slate-900/50">
        <button class="btn btn-outline w-full justify-center py-3" id="btn-add-root" title="Add a new root topic">+ Add New Root Node</button>
      </div>
    </aside>

    <section id="panel-preview">
      <div class="h-10 px-4 border-b border-slate-800 flex items-center justify-between bg-slate-950/40 text-[0.7rem]">
        <div class="flex items-center gap-2">
          <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
          <span class="text-slate-400 uppercase tracking-widest font-bold">Live Preview</span>
        </div>
        <div class="flex gap-4 text-slate-500 mono">
          <span id="stat-nodes">NODES: 0</span>
          <span id="stat-depth">DEPTH: 0</span>
        </div>
      </div>
      <div class="tree-viewport">
        <div id="ascii-render" class="mono"></div>
      </div>
    </section>
  </main>

  <footer class="h-8 px-6 border-t border-slate-800 flex items-center justify-between text-[0.6rem] text-slate-500 bg-slate-950/80">
    <div class="flex gap-4"><span>SYSTEM_READY</span><span id="footer-save-indicator">AUTO_SAVE: ON</span></div>
    <div class="text-center">Made by @chqrlzz</div>
    <div class="mono opacity-50">V0.9.1_MODULAR</div>
  </footer>

  <!-- ── MODALS ── -->
  <div id="modal-tips" class="modal-overlay">
    <div class="modal-content">
      <div class="flex justify-between items-center mb-4">
        <h3 class="font-bold text-accent">Interface Tips</h3>
        <button onclick="document.getElementById('modal-tips').classList.remove('active')">✕</button>
      </div>
      <div class="space-y-4 text-sm text-slate-300">
        <p>• Click nodes in the preview to focus them.</p>
        <p>• Use Ctrl+Z / Ctrl+Y for Undo/Redo.</p>
        <p>• Search now highlights matches in the preview!</p>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <!-- JavaScript Modules -->
  <script src="src/js/state.js"></script>
  <script src="src/js/ui.js"></script>
  <script src="src/js/main.js"></script>
</body>
</html>
