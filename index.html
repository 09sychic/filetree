<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tree Architect — Modern Structure Designer</title>
  
  <link rel="stylesheet" href="src/style.css" />
  <!-- Export Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

  <div class="app-container">
    <header>
      <div class="brand">
        <div class="brand-icon">T</div>
        <div class="brand-name">Tree Architect</div>
      </div>

      <div class="header-toolbar">
        <div class="flex gap-1 border-r border-white/10 pr-2 mr-1">
          <button class="btn btn-icon" id="btn-undo" title="Undo (Ctrl+Z)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 14L4 9l5-5"/><path d="M20 20v-7a4 4 0 00-4-4H4"/></svg>
          </button>
          <button class="btn btn-icon" id="btn-redo" title="Redo (Ctrl+Y)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 14l5-5-5-5"/><path d="M4 20v-7a4 4 0 014-4h12"/></svg>
          </button>
        </div>

        <button class="btn" id="btn-expand-all">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
          Expand All
        </button>
        
        <button class="btn" id="btn-clear-all">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
          Reset
        </button>

        <div class="dropdown" id="export-dropdown">
          <button class="btn primary" onclick="this.parentElement.classList.toggle('active')">
            Export 
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>
          </button>
          <div class="dropdown-content">
            <div class="dropdown-item" id="btn-copy">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              Copy ASCII
            </div>
            <div class="dropdown-item" id="btn-export-md">Markdown List</div>
            <div class="dropdown-item" id="btn-export-mmd">Mermaid Diagram</div>
            <div class="dropdown-item" id="btn-export-json">JSON Source</div>
            <div class="border-t border-white/5 my-1"></div>
            <div class="dropdown-item" id="btn-shot">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
              Standard Image
            </div>
            <div class="dropdown-item" id="btn-export-radial">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M12 2v3M12 19v3M2 12h3M19 12h3"></path></svg>
              Radial Mind Map
            </div>
            <div class="dropdown-item" id="btn-import">Import JSON</div>
            <div class="dropdown-item" id="btn-print">Print view</div>
          </div>
        </div>
      </div>
    </header>

    <main>
      <aside id="sidebar">
        <div class="sidebar-header">
          <input type="text" id="node-search" class="search-box" placeholder="Search Architecture...">
          <button class="btn primary w-full" id="btn-add-root">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
            New Root Topic
          </button>
          <div id="breadcrumb-nav" class="flex gap-1 overflow-x-auto text-[0.65rem] text-white/30 font-bold uppercase tracking-widest"></div>
        </div>
        
        <div class="node-list-container" id="nodes-root-list"></div>
      </aside>

      <section id="canvas">
        <div class="canvas-toolbar">
          <div class="flex gap-6">
            <span id="stat-nodes">NODES: 0</span>
            <span id="stat-depth">DEPTH: 0</span>
          </div>
          <div id="canvas-status">SYSTEM IDLE</div>
        </div>

        <div class="viewport">
          <div id="ascii-render" class="mono">
            <div class="preview-controls">
              <button class="btn btn-icon" title="Copy Tree" onclick="UIController.handleClipboardCopy()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
              </button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div>Professional Tree Architect</div>
      <div id="footer-save-indicator">Ready</div>
      <div class="mono">v1.2.4-core</div>
    </footer>
  </div>

  <div id="toast"></div>

  <!-- Radial Export Hidden Canvas -->
  <div id="radial-export-container"></div>

  <script src="src/js/state.js"></script>
  <script src="src/js/ui.js"></script>
  <script src="src/js/main.js"></script>
  <script>
    window.onclick = (e) => {
      if (!e.target.closest('#export-dropdown')) {
        document.getElementById('export-dropdown').classList.remove('active');
      }
    };
  </script>
</body>
</html>
